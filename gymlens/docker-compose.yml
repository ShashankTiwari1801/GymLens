services:
  postgres:
    image: postgres:16
    container_name: gymlens-postgres
    environment:
      POSTGRES_DB: gymlensdb
      POSTGRES_USER: gymlensuser
      POSTGRES_PASSWORD: gymlenspass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gymlens-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
