spring:
  application:
    name: gymlens

  datasource:
    url: jdbc:postgresql://localhost:5432/notificationdb
    username: notifuser
    password: notifpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
